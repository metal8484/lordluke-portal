<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const supabaseUrl = "https://iupwqyksdntdccnzoxrb.supabase.co";
      const supabaseKey = "sb_publishable_hUYF2MqC5s12fi-3mRoSng_-pwwzK2V";
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    </script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
      }

      .box {
        width: 90%;
        max-width: 420px;
        margin: 100px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #2d7ff9;
        color: white;
        border: none;
        cursor: pointer;
      }

      #msg {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>🔐 Change Your Password</h2>

      <input type="password" id="pass1" placeholder="New Password" />
      <input type="password" id="pass2" placeholder="Confirm Password" />

      <button id="updateBtn">Update Password</button>

      <p id="msg"></p>
    </div>

    <script>
      document
        .getElementById("updateBtn")
        .addEventListener("click", async () => {
          const p1 = document.getElementById("pass1").value.trim();
          const p2 = document.getElementById("pass2").value.trim();
          const msg = document.getElementById("msg");

          if (!p1 || !p2) {
            msg.textContent = "❌ Fill all fields";
            return;
          }

          if (p1 !== p2) {
            msg.textContent = "❌ Passwords do not match";
            return;
          }

          const { data: sessionData } = await supabaseClient.auth.getSession();

          const userId = sessionData.session.user.id;
          console.log("USER ID:", userId);

          // 1. update password
          await supabaseClient.auth.updateUser({
            password: p1,
          });

          // 2. IMPORTANT: clear flag in DB
          const { error } = await supabaseClient
            .from("students")
            .update({ must_change_password: false })
            .eq("auth_user_id", userId);

          if (error) {
            console.log("DB ERROR:", error);
            msg.textContent = "❌ " + error.message;
            return;
          }

          const { error: deleteError } = await supabaseClient
            .from("password_reset_requests")
            .delete()
            .eq("auth_user_id", userId);

          console.log("DELETE ERROR:", deleteError);

          msg.textContent = "✅ Password updated successfully";
          setTimeout(() => {
            window.location.href = "student-dashboard.html";
          }, 1500);
        });
    </script>
  </body>
</html>
