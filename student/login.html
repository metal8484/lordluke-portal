<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Portal Login</title>
    <link rel="stylesheet" href="portal.css" />

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = "https://iupwqyksdntdccnzoxrb.supabase.co";
      const supabaseKey = "sb_publishable_hUYF2MqC5s12fi-3mRoSng_-pwwzK2V";
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    </script>
  </head>
  <body>
    <div class="login-background">
      <div class="portal-container">
        <img src="images/image.png" alt="School Logo" class="school-logo" />

        <p class="login-welcome">

        </p>

        <form id="login-form">
          <label for="student-id">Student ID</label>
          <input

            id="student-id"

          />
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />
          <button type="submit">Login</button>
        </form>

        <p id="login-message"></p>
        <a href="../index.html">Back to Main Website</a>
      </div>
    </div>

    <!-- LOGIN JS -->
    <script src="login.js"></script>
  </body>
