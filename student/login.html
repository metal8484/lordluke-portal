<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Portal Login</title>

    <link rel="stylesheet" href="portal.css" />

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const supabaseUrl = "https://iupwqyksdntdccnzoxrb.supabase.co";
      const supabaseKey = "sb_publishable_hUYF2MqC5s12fi-3mRoSng_-pwwzK2V";
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    </script>

    <style>
      /* ================= MODAL DESIGN ================= */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .modal-box {
        width: 90%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        animation: pop 0.25s ease;
      }

      @keyframes pop {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-box h2 {
        color: #2d7ff9;
        margin-bottom: 10px;
      }

      .modal-box p {
        font-size: 14px;
        line-height: 1.6;
        color: #333;
      }

      .modal-box button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        background: #2d7ff9;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }

      .modal-box button:hover {
        background: #1b5fd6;
      }
    </style>
  </head>

  <body>
    <div class="login-background">
      <div class="portal-container">
        <img src="images/image.png" class="school-logo" />

        <h1>Student Login</h1>

        <p class="login-welcome">Enter your email and password to continue</p>

        <form id="login-form">
          <label>Email</label>
          <input type="email" id="email" required />

          <label>Password</label>
          <input type="password" id="password" required />

          <button type="submit">Login</button>

          <p class="forgot-password">
            <a href="#" id="forgotPasswordLink">Forgot Password?</a>
          </p>
        </form>

        <p id="login-message"></p>
        <a href="../index.html">Back to Main Website</a>
      </div>
    </div>

    <!-- ================= MODAL ================= -->
    <div id="successModal" class="modal-overlay">
      <div class="modal-box">
        <h2>✅ Request Sent</h2>

        <p>
          📩 be Checking your Email, SMS, or WhatsApp.<br /><br />
          📞 You may receive a call from your registered number.<br /><br />
          ⏳ Processing may take up to 24 hours.<br /><br />
          🙏 Please do not submit multiple requests.
        </p>

        <button id="closeModal">OK</button>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
