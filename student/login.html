<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Portal Login</title>

    <link rel="stylesheet" href="portal.css" />

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const supabaseUrl = "https://iupwqyksdntdccnzoxrb.supabase.co";
      const supabaseKey = "sb_publishable_hUYF2MqC5s12fi-3mRoSng_-pwwzK2V";

      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    </script>
  </head>

  <body>
    <div class="login-background">
      <div class="portal-container">
        <img src="images/image.png" class="school-logo" />

        <h1>Student Login</h1>

        <p class="login-welcome">Enter your email and password to continue</p>

        <!-- LOGIN FORM -->
        <form id="login-form">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />

          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />

          <button type="submit">Login</button>

          <!-- ✅ FORGOT PASSWORD ADDED SAFELY -->
          <p class="forgot-password">
            <a href="#" id="forgotPasswordLink">Forgot Password?</a>
          </p>
        </form>

        <p id="login-message"></p>

        <a href="../index.html">Back to Main Website</a>
      </div>
    </div>

    <!-- ================= LOGIN SCRIPT ================= -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("login-form");
        const message = document.getElementById("login-message");

        // ================= LOGIN (UNCHANGED) =================
        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!email || !password) {
            message.textContent = "❌ Please fill all fields!";
            message.style.color = "red";
            return;
          }

          try {
            const { data, error } =
              await supabaseClient.auth.signInWithPassword({
                email,
                password,
              });

            console.log("LOGIN RESULT:", { data, error });

            if (error) {
              message.textContent = "❌ " + error.message;
              message.style.color = "red";
              return;
            }

            message.textContent = "✅ Login Successful!";
            message.style.color = "green";

            localStorage.setItem("loggedIn", "true");

            setTimeout(() => {
              window.location.href = "student-dashboard.html";
            }, 800);
          } catch (err) {
            console.error(err);
            message.textContent = "❌ Server error, try again!";
            message.style.color = "red";
          }
        });

        // ================= FORGOT PASSWORD (NEW SAFE ADDITION) =================
        document.addEventListener("click", async (e) => {
          if (e.target && e.target.id === "forgotPasswordLink") {
            e.preventDefault();

            console.log("Forgot password clicked");

            const email = prompt("Enter your registered email address:");

            if (!email) return;

            try {
              const { data, error } = await supabaseClient
                .from("password_reset_requests")
                .insert([
                  {
                    student_email: email.trim(),
                    status: "Pending",
                  },
                ])
                .select();

              console.log("INSERT RESULT:", { data, error });

              if (error) {
                alert("❌ Failed: " + error.message);
                return;
              }

              if (!data || data.length === 0) {
                alert("⚠️ No data inserted. Check Supabase table or RLS.");
                return;
              }

              alert("✅ Password reset request sent successfully!");
            } catch (err) {
              console.error("ERROR:", err);
              alert("❌ Unexpected error occurred");
            }
          }
        });
      });
    </script>
  </body>
</html>
