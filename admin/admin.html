<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="admin.css" />
    <style>
      /* Inline style for the back button to make it bold and white */
      #back-btn {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 12px;
        font-weight: bold;
        color: white;
        background-color: #000; /* black background to make it visible */
        border: none;
        cursor: pointer;
        text-decoration: none;
      }
      #back-btn:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body class="login-page">
    <h2>Admin Login</h2>
    <form id="login-form">
      <label>Email:</label>
      <input type="email" id="login-email" placeholder="Email" required />
      <label>Password:</label>
      <input
        type="password"
        id="login-password"
        placeholder="Password"
        required
      />
      <button type="submit">Login</button>
      <p id="login-message"></p>
    </form>

    <!-- Back Button to Website -->
    <a href="../index.html" id="back-btn">Back to Website</a>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const supabaseUrl = "https://iupwqyksdntdccnzoxrb.supabase.co";
        const supabaseKey = "sb_publishable_hUYF2MqC5s12fi-3mRoSng_-pwwzK2V";

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById("login-form");
        const loginMessage = document.getElementById("login-message");

        loginForm.addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("login-email").value.trim();
          const password = document
            .getElementById("login-password")
            .value.trim();

          const { data: admin, error } = await supabaseClient
            .from("admins")
            .select("*")
            .eq("email", email)
            .eq("password", password)
            .single();

          if (error || !admin) {
            loginMessage.style.color = "red";
            loginMessage.textContent = "Invalid email or password!";
            return;
          }

          const isCentral =
            admin.username === "central" || admin.username === "centraladmin";

          localStorage.setItem("adminLoggedIn", "true");

          localStorage.setItem(
            "currentAdmin",
            JSON.stringify({
              ...admin,
              role: admin.role || "Admin",
              isCentral: isCentral,
            }),
          );

          loginMessage.style.color = "green";
          loginMessage.textContent = "Login successful...";

          setTimeout(() => {
            window.location.href = "admin-dashboard.html";
          }, 800);
        });
      });
    </script>
  </body>
</html>
