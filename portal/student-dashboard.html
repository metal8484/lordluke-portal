<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="portal.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Header -->
      <header class="dashboard-header">
        <div class="header-left">
          <img src="images/image.png" alt="School Logo" class="school-logo" />
        </div>
        <div class="header-center">
          <h1 id="student-name-header">Welcome, Student</h1>
        </div>
        <div class="header-right">
          <img
            src="images/default-profile.png"
            alt="Profile Picture"
            class="student-profile"
            id="student-profile"
          />
          <button id="logout-btn">Logout</button>
        </div>
      </header>

      <!-- Default School News View -->
      <section class="school-news" id="default-view">
        <h2>School News</h2>
        <ul>
          <li>📢 School resumes on Monday.</li>
          <li>📢 Read your book if you go home, prepare for test on Monday.</li>
          <li>📢 Inter-house sports next month.</li>
        </ul>
        <div class="toggle-buttons">
          <button id="show-results-btn">View Results</button>
          <button id="show-id-card-btn">View ID Card</button>
        </div>
      </section>

      <!-- Results Panel -->
      <section class="student-results" style="display: none">
        <button id="results-back-btn" class="top-back-btn">
          ← Back to Dashboard
        </button>
        <h2>Your Results</h2>
        <table id="results-table">
          <thead>
            <tr>
              <th>Subject</th>
              <th>Score</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="academic-summary">
          <h3>Academic Summary</h3>
          <p>
            <strong>Average Score:</strong> <span id="average-score"></span>
          </p>
          <p>
            <strong>Performance:</strong> <span id="performance-level"></span>
          </p>
        </div>
      </section>

      <!-- ID Card Panel -->
      <section id="id-card-section" style="display: none">
        <button id="id-card-back-btn" class="top-back-btn">
          ← Back to Dashboard
        </button>
        <div class="id-card">
          <img
            src="images/default-profile.png"
            id="id-card-photo"
            alt="Student Photo"
          />
          <h2 id="id-card-name">Student Name</h2>
          <p><strong>ID:</strong> <span id="id-card-id"></span></p>
          <p><strong>Class:</strong> <span id="id-card-class"></span></p>
          <p><strong>Email:</strong> <span id="id-card-email"></span></p>
          <div class="id-card-gallery" id="id-card-gallery"></div>
        </div>
      </section>
    </div>

    <script src="portal.js"></script>
  </body>
</html>
